<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="720" rx="32" fill="#F3F8FF"/>
  <text x="74" y="102" fill="#162641" font-family="Arial, sans-serif" font-size="54" font-weight="700">功能亮点</text>
  <text x="74" y="146" fill="#6A7D92" font-family="Arial, sans-serif" font-size="24">适合放在 README 首页，快速说明项目能做什么。</text>

  <rect x="74" y="198" width="320" height="220" rx="28" fill="white" stroke="#D9E4EE"/>
  <circle cx="140" cy="264" r="32" fill="#D9F3EA"/>
  <text x="125" y="275" fill="#0F7B6C" font-family="Arial, sans-serif" font-size="30">📍</text>
  <text x="74" y="338" fill="#162641" font-family="Arial, sans-serif" font-size="34" font-weight="700">自动定位</text>
  <text x="74" y="378" fill="#64778D" font-family="Arial, sans-serif" font-size="24">打开页面后优先尝试浏览器定位，</text>
  <text x="74" y="410" fill="#64778D" font-family="Arial, sans-serif" font-size="24">自动显示当前位置天气。</text>

  <rect x="440" y="198" width="320" height="220" rx="28" fill="white" stroke="#D9E4EE"/>
  <circle cx="506" cy="264" r="32" fill="#FFF0DA"/>
  <text x="491" y="275" fill="#E38B2C" font-family="Arial, sans-serif" font-size="30">🔎</text>
  <text x="440" y="338" fill="#162641" font-family="Arial, sans-serif" font-size="34" font-weight="700">城市搜索</text>
  <text x="440" y="378" fill="#64778D" font-family="Arial, sans-serif" font-size="24">支持城市、区县名称快速检索，</text>
  <text x="440" y="410" fill="#64778D" font-family="Arial, sans-serif" font-size="24">减少层层选择的成本。</text>

  <rect x="806" y="198" width="320" height="220" rx="28" fill="white" stroke="#D9E4EE"/>
  <circle cx="872" cy="264" r="32" fill="#E5EBFF"/>
  <text x="857" y="275" fill="#5873D6" font-family="Arial, sans-serif" font-size="30">☁</text>
  <text x="806" y="338" fill="#162641" font-family="Arial, sans-serif" font-size="34" font-weight="700">天气卡片</text>
  <text x="806" y="378" fill="#64778D" font-family="Arial, sans-serif" font-size="24">集中展示温度、湿度、风向、</text>
  <text x="806" y="410" fill="#64778D" font-family="Arial, sans-serif" font-size="24">风力和更新时间。</text>

  <rect x="74" y="454" width="500" height="196" rx="28" fill="#15314D"/>
  <text x="112" y="520" fill="white" font-family="Arial, sans-serif" font-size="36" font-weight="700">后端代理 API</text>
  <text x="112" y="566" fill="#C9D9E8" font-family="Arial, sans-serif" font-size="24">浏览器只访问本地 Python 服务，</text>
  <text x="112" y="600" fill="#C9D9E8" font-family="Arial, sans-serif" font-size="24">不会把 API Key 直接暴露到前端代码里。</text>

  <rect x="626" y="454" width="500" height="196" rx="28" fill="#0F7B6C"/>
  <text x="664" y="520" fill="white" font-family="Arial, sans-serif" font-size="36" font-weight="700">故障自动回退</text>
  <text x="664" y="566" fill="#D7F5EE" font-family="Arial, sans-serif" font-size="24">高德不可用时，后端会自动切换到</text>
  <text x="664" y="600" fill="#D7F5EE" font-family="Arial, sans-serif" font-size="24">备用天气与地理编码服务，保证基础可用。</text>
</svg>
