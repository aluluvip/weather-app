<svg width="1200" height="860" viewBox="0 0 1200 860" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="860" rx="32" fill="#F3F8FF"/>
  <text x="74" y="98" fill="#162641" font-family="Arial, sans-serif" font-size="56" font-weight="700">功能亮点</text>
  <text x="74" y="142" fill="#6B7E93" font-family="Arial, sans-serif" font-size="24">适合放在 README 首页，快速说明项目能做什么。</text>

  <rect x="74" y="196" width="320" height="252" rx="28" fill="white" stroke="#D9E4EE"/>
  <circle cx="140" cy="270" r="42" fill="#DDF3EC"/>
  <text x="119" y="282" fill="#0F7B6C" font-family="Arial, sans-serif" font-size="34">📍</text>
  <text x="112" y="362" fill="#162641" font-family="Arial, sans-serif" font-size="34" font-weight="700">自动定位</text>
  <text x="108" y="406" fill="#64778D" font-family="Arial, sans-serif" font-size="24">打开页面后优先尝试</text>
  <text x="108" y="440" fill="#64778D" font-family="Arial, sans-serif" font-size="24">浏览器定位并显示天气。</text>

  <rect x="440" y="196" width="320" height="252" rx="28" fill="white" stroke="#D9E4EE"/>
  <circle cx="506" cy="270" r="42" fill="#FFF0DA"/>
  <text x="485" y="282" fill="#E38B2C" font-family="Arial, sans-serif" font-size="34">🔎</text>
  <text x="478" y="362" fill="#162641" font-family="Arial, sans-serif" font-size="34" font-weight="700">城市搜索</text>
  <text x="474" y="406" fill="#64778D" font-family="Arial, sans-serif" font-size="24">支持城市和区县名称</text>
  <text x="474" y="440" fill="#64778D" font-family="Arial, sans-serif" font-size="24">快速检索，减少选择步骤。</text>

  <rect x="806" y="196" width="320" height="252" rx="28" fill="white" stroke="#D9E4EE"/>
  <circle cx="872" cy="270" r="42" fill="#E7ECFF"/>
  <text x="851" y="282" fill="#5873D6" font-family="Arial, sans-serif" font-size="34">☁</text>
  <text x="844" y="362" fill="#162641" font-family="Arial, sans-serif" font-size="34" font-weight="700">天气卡片</text>
  <text x="840" y="406" fill="#64778D" font-family="Arial, sans-serif" font-size="24">集中展示温度、湿度、</text>
  <text x="840" y="440" fill="#64778D" font-family="Arial, sans-serif" font-size="24">风向、风力和更新时间。</text>

  <rect x="74" y="506" width="500" height="240" rx="30" fill="#173553"/>
  <text x="112" y="578" fill="white" font-family="Arial, sans-serif" font-size="40" font-weight="700">后端代理 API</text>
  <text x="112" y="632" fill="#D0DCE9" font-family="Arial, sans-serif" font-size="26">浏览器只访问本地 Python 服务，</text>
  <text x="112" y="670" fill="#D0DCE9" font-family="Arial, sans-serif" font-size="26">不会把 API Key 暴露到前端代码里。</text>

  <rect x="626" y="506" width="500" height="240" rx="30" fill="#158A73"/>
  <text x="664" y="578" fill="white" font-family="Arial, sans-serif" font-size="40" font-weight="700">故障自动回退</text>
  <text x="664" y="632" fill="#DDF7F1" font-family="Arial, sans-serif" font-size="26">高德不可用时，后端会自动切换到</text>
  <text x="664" y="670" fill="#DDF7F1" font-family="Arial, sans-serif" font-size="26">备用天气与地理编码服务。</text>
</svg>
